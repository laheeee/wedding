<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Lee Byeong gwon & Kim La Hee</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="invitation-container">
        <!-- 편지봉투 애니메이션 컨테이너 -->
        <div class="envelope-container">
            <div class="envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body">
                    <div class="wedding-text">
                        <h1>The Wedding of</h1>
                        <h2>Lee Byeong gwon & Kim La Hee</h2>
                        <p class="date">2026.08.08.</p>
                    </div>
                </div>
            </div>

            <!-- 사진 컨테이너 -->
            <div class="photo-container">
                <img src="IMG_7450.jpg" alt="Wedding Photo 1" class="wedding-photo photo-1">
                <img src="IMG_7449.jpg" alt="Wedding Photo 2" class="wedding-photo photo-2">
            </div>
        </div>

        <!-- 기존 청첩장 내용 (편지봉투 열린 후 표시) -->
        <div class="invitation-content" style="display: none;">
            <header class="header">
                <h1>결혼식 청첩장</h1>
                <div class="hearts">💕💕💕</div>
            </header>

            <main class="main-content">
                <div class="couple-info">
                    <h2>이병권 & 김라희</h2>
                    <p class="relationship">의 결혼을 축하드립니다</p>
                </div>

                <div class="wedding-details">
                    <div class="detail-item">
                        <h3>📅 날짜</h3>
                        <p>2026년 8월 8일</p>
                    </div>
                    <div class="detail-item">
                        <h3>🕐 시간</h3>
                        <p>오후 4시</p>
                    </div>
                    <div class="detail-item">
                        <h3>📍 장소</h3>
                        <p>서울특별시 강남구<br>더 파크뷰 웨딩홀</p>
                    </div>
                </div>

                <div class="message">
                    <p>새로운 시작을 함께 축하해 주시면<br>더없이 기쁠 것입니다.</p>
                </div>

                <div class="contact-info">
                    <h3>연락처</h3>
                    <p>신랑측: 이병권 (010-1234-5678)</p>
                    <p>신부측: 김라희 (010-9876-5432)</p>
                </div>
            </main>

            <footer class="footer">
                <p>참석 여부를 알려주세요</p>
                <button class="rsvp-button">참석 의사 전달</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
