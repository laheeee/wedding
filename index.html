<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결혼식 청첩장</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="invitation-container">
        <header class="header">
            <h1>결혼식 청첩장</h1>
            <div class="hearts">💕💕💕</div>
        </header>

        <main class="main-content">
            <div class="couple-info">
                <h2>김철수 & 이영희</h2>
                <p class="relationship">의 결혼을 축하드립니다</p>
            </div>

            <div class="wedding-details">
                <div class="detail-item">
                    <h3>📅 날짜</h3>
                    <p>2026년 3월 15일</p>
                </div>
                <div class="detail-item">
                    <h3>🕐 시간</h3>
                    <p>오후 4시</p>
                </div>
                <div class="detail-item">
                    <h3>📍 장소</h3>
                    <p>서울특별시 강남구<br>더 파크뷰 웨딩홀</p>
                </div>
            </div>

            <div class="message">
                <p>새로운 시작을 함께 축하해 주시면<br>더없이 기쁠 것입니다.</p>
            </div>

            <div class="contact-info">
                <h3>연락처</h3>
                <p>신랑측: 김철수 (010-1234-5678)</p>
                <p>신부측: 이영희 (010-9876-5432)</p>
            </div>
        </main>

        <footer class="footer">
            <p>참석 여부를 알려주세요</p>
            <button class="rsvp-button">참석 의사 전달</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
